<!DOCTYPE html>
<html lang="en">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>
   Create Account | University Portal
  </title>
  <link href="assets/style.css" rel="stylesheet"/>
 </head>
 <body class="auth-simple-page auth-register-page">
  <main class="simple-auth-shell">
   <div class="orb orb-orange">
   </div>
   <div class="orb orb-blue">
   </div>
   <div class="orb orb-small orb-small-orange">
   </div>
   <div class="orb orb-small orb-small-blue">
   </div>
   <section class="simple-auth-card">
    <div class="simple-auth-logo">
     UP
    </div>
    <div class="simple-auth-header">
     <h1>
      Create Account
     </h1>
     <p>
      Set up your student or instructor access in one simple step.
     </p>
    </div>
    <div class="form-box simple-auth-form">
     <label class="sr-only" for="reg-name">
      Full Name
     </label>
     <input id="reg-name" placeholder="Enter your full name" type="text"/>
     <label class="sr-only" for="reg-email">
      Email Address
     </label>
     <input id="reg-email" placeholder="Enter your email address" type="email"/>
     <label class="sr-only" for="reg-id">
      Student or Faculty ID
     </label>
     <input id="reg-id" placeholder="Enter student or faculty ID" type="text"/>
     <label class="sr-only" for="reg-role">
      Select Role
     </label>
     <select id="reg-role">
      <option>
       Student
      </option>
      <option>
       Instructor
      </option>
     </select>
     <label class="sr-only" for="reg-password">
      Password
     </label>
     <input id="reg-password" placeholder="Create password" type="password"/>
     <label class="sr-only" for="reg-confirm">
      Confirm Password
     </label>
     <input id="reg-confirm" placeholder="Confirm password" type="password"/>
     <div class="btn-row">
      <a class="btn" href="index.html" id="create-account-btn">
       Create Account
      </a>
     </div>
    </div>
    <div class="simple-demo-box">
     <p>
      Use a unique email to create a new local demo account.
     </p>
    </div>
    <p class="footer-text simple-footer-text">
     Already have an account?
     <a href="index.html">
      Back to login
     </a>
    </p>
   </section>
  </main>
  <script src="assets/app.js">
  </script>
 </body>
</html>
